services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
      - permitos-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/permitos.db

  conductor:
    build: .
    command: python -m agents.conductor.agent
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
    profiles:
      - agents

  jurisdiction:
    build: .
    command: python -m agents.jurisdiction.agent
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
    profiles:
      - agents

  building:
    build: .
    command: python -m agents.building.agent
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
    profiles:
      - agents

  site:
    build: .
    command: python -m agents.site_environmental.agent
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
    profiles:
      - agents

  packager:
    build: .
    command: python -m agents.packager.agent
    env_file:
      - .env
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
    profiles:
      - agents

volumes:
  permitos-data:
